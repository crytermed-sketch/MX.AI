<!DOCTYPE html>
<html lang="pl">
<head>

    <title>MX.AI - Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<body>

    <nav>
        <a href="index.html" class="logo">MX<span>.AI</span></a>
        
        <div class="lang-switcher" style="display: flex; gap: 10px; margin-left: auto; margin-right: 30px;">
            <button class="lang-btn active" onclick="changeLang('pl')" id="lang-pl" style="background:transparent; color:#fff; border:1px solid var(--border-glass); padding:5px 10px; border-radius:8px; cursor:pointer;">PL</button>
            <button class="lang-btn" onclick="changeLang('en')" id="lang-en" style="background:transparent; color:#fff; border:1px solid var(--border-glass); padding:5px 10px; border-radius:8px; cursor:pointer;">EN</button>

    <div class="container" style="justify-content: center;">

        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <a href="survey.html" class="portfolio-item" data-t="portfolioItem1">Trener Wheelie AI</a>
            <div class="portfolio-item" onclick="showToast('Wait project has start Soon..')" data-t="portfolioItem2">Soon...</div>

    <script src="app.js"></script>

</html>
